name: CI PR to Dev

on:
  pull_request:
    branches: [ "dev" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.MLFLOW_TRACKING_USERNAME }}/MLOps_final_project.mlflow
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # On s'assure que dvc est bien installé avec le support HTTPS
        pip install dvc[http] 

    - name: Configure DVC Remote
      run: |
        # On configure l'accès aux données avec ton token secret
        dvc remote modify origin --local auth basic
        dvc remote modify origin --local user ${{ secrets.MLFLOW_TRACKING_USERNAME }}
        dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

    - name: Pull data from DVC
      run: |
        # Téléchargement effectif du fichier iris.csv
        dvc pull -r origin

    - name: Run Unit & Integration Tests
      run: |
        pytest tests/

    - name: Build Docker images
      run: |
        docker build -t backend-image ./backend
