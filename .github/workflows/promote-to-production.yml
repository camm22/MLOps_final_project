name: Promote to Production

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality-gate-and-promote:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install mlflow dagshub pandas

    - name: Run Quality Gate
      run: |
        python check_quality.py

    - name: Promote Model to @Production (DagsHub)
      if: success()
      run: |
        python -c "
        import mlflow
        import os
        os.environ['MLFLOW_TRACKING_URI'] = 'https://dagshub.com/${{ secrets.MLFLOW_TRACKING_USERNAME }}/MLOps_final_project.mlflow'
        client = mlflow.tracking.MlflowClient()
        staging_version = client.get_model_version_by_alias('iris_logistic_model', 'staging')
        client.set_registered_model_alias('iris_logistic_model', 'production', staging_version.version)
        print(f'Modèle version {staging_version.version} promu en @production')
        "

    - name: Merge Staging to Main
      if: success()
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git fetch origin
        git checkout main
        git merge origin/staging --no-ff -m "Promote staging to production [skip ci]"
        git push origin main

    - name: Trigger Render Production Deploy
      if: success()
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}
