name: Promote to Production

on:
  workflow_dispatch:

jobs:
  quality-gate-and-promote:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install mlflow dagshub pandas

    - name: Run Quality Gate
      run: |
        python check_quality.py

    - name: Promote Model to @Production (DagsHub)
      if: success()
      run: |
        python -c "
        import mlflow
        import os
        client = mlflow.tracking.MlflowClient()
        latest_staging = client.get_latest_versions('iris_logistic_model', stages=['Staging'])[0]
        client.set_registered_model_alias('iris_logistic_model', 'Production', latest_staging.version)
        print(f'Modèle version {latest_staging.version} promu en @Production')
        "

    - name: Merge Staging to Main
      if: success()
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git checkout main
        git merge staging --no-ff -m "Promote staging to production [skip ci]"
        git push origin main

    - name: Trigger Render Production Deploy
      if: success()
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}
